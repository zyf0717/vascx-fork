########################
# Overlay Image Output #
########################

# Used by overlays/, vessel_width_overlays/, and vessel_tortuosity_overlays/.
overlay:
  enabled: true # true|false
  layers:
    arteries: true # true|false
    veins: true # true|false
    disc: true # true|false
    fovea: true # true|false
  colours:
    artery: "#FF0000" # RGB hex, e.g. "#RRGGBB"
    vein: "#0000FF" # RGB hex
    vessel: "#00FF00" # RGB hex; also used for tortuosity overlays
    disc: "#FFFFFF" # RGB hex
    fovea: "#FFFF00" # RGB hex
    vessel_widths: "#00FF00" # RGB hex; width markers only
    branch_point: "#FFFF00" # RGB hex; branching junction marker
    branch_angle: "#ADD8E6" # RGB hex; straight branching-angle guide lines
  circle_colours: {} # optional mapping, e.g. {"2r": "#00FF00", "5r": "#FF8800"}

#################
# Vessel Widths #
#################

vessel_widths:
  enabled: true # true|false; compute vessel_widths.csv, vessel_equivalents.csv, and vessel_width_overlays/
  inner_circle: "2r" # e.g. "2r" = 2x disc radius
  outer_circle: "3r" # must be larger than inner_circle; circles are auto-derived from these names
  samples_per_connection: 5 # positive integer = evenly spaced samples per vessel; -1 = every interior path pixel
  boundary_tolerance_px: 1.5 # positive number; annulus boundary tolerance for path selection
  method: "mask" # one of: "mask", "pvbm_mask", "profile"
  mask:
    tangent_window_px: 5.0 # positive number; local skeleton window for mask tangent estimation
    measurement_step_px: 0.25 # positive number; step size when tracing mask boundaries
    boundary_refinement_steps: 12 # positive integer; binary-search refinement iterations for mask boundaries
    trace_padding_px: 2.0 # non-negative number; extra search distance beyond the image diagonal
  pvbm_mask:
    direction_lag_px: 6.0 # positive number; used by "pvbm_mask"
    max_asymmetry_px: 1.0 # non-negative number; used by "pvbm_mask"
    trace_step_px: 1.0 # positive number; step size when tracing integer mask widths
    boundary_adjust_px: 0.5 # non-negative number; boundary offset added after the last inside step
    trace_padding_px: 2.0 # non-negative number; extra search distance beyond the image diagonal
  profile:
    image_source: "preprocessed_rgb" # output subdir or absolute RGB path; used by "profile"
    channel: "green" # one of: "red", "green", "blue"
    half_length_px: 20.0 # positive number
    sample_step_px: 0.25 # positive number
    smoothing_sigma_px: 1.0 # non-negative number
    boundary_method: "half_depth" # currently only: "half_depth"
    threshold_alpha: 0.5 # number in [0, 1]
    min_contrast: 0.05 # non-negative number
    min_width_px: 1.0 # positive number; must be <= max_width_px
    max_width_px: 80.0 # positive number; must be >= min_width_px
    use_mask_guardrail: true # true|false
    mask_guardrail_min_ratio: 0.4 # positive number; must be <= mask_guardrail_max_ratio
    mask_guardrail_max_ratio: 2.5 # positive number; must be >= mask_guardrail_min_ratio
    fallback_to_mask: false # true|false; used by "profile"

######################
# Vessel Tortuosity  #
######################

vessel_tortuosities:
  enabled: true # true|false; compute vessel_tortuosities.csv, vessel_tortuosity_summary.csv, and vessel_tortuosity_overlays/
  inner_circle: "2r" # circle names must use the '<multiplier>r' format
  outer_circle: "5r" # must be larger than inner_circle

####################
# Vessel Branching #
####################

vessel_branching:
  enabled: true # true|false; compute vessel_branching.csv, vessel_branching_widths.csv, and vessel_branching_overlays/
  inner_circle: "2r" # circle names must use the '<multiplier>r' format
  outer_circle: "5r" # must be larger than inner_circle
  boundary_tolerance_px: 1.5 # positive number; annulus boundary tolerance for branch tree selection
  min_branch_length_px: 15.0 # positive number; minimum parent/daughter path length from the branch point
  width_skip_px: 5.0 # non-negative number; distance skipped away from the branch point before width sampling
  width_sample_length_px: 15.0 # positive number; span over which each branch's width samples are placed
  width_samples_per_branch: 3 # positive integer; samples per parent/daughter branch for median width
  angle_sample_px: 10.0 # positive number; distance from branch point used for daughter direction vectors
  measurement_step_px: 0.25 # positive number; step size when tracing mask boundaries
  boundary_refinement_steps: 12 # positive integer; binary-search refinement iterations for mask boundaries
  trace_padding_px: 2.0 # non-negative number; extra search distance beyond the image diagonal
